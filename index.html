<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRM Ремонт Pro</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CRM Ремонт Pro">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
    
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #f78166;
            --green: #3fb950; --red: #f85149; --blue: #58a6ff; --yellow: #d2991d;
            --purple: #a371f7; --text: #c9d1d9; --sub: #8b949e; --input: #21262d;
            --font-size: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: var(--text); 
            max-width: 750px; margin: 0 auto; padding: 8px; 
            font-size: var(--font-size); 
            -webkit-tap-highlight-color: transparent; 
        }
        .tabs { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 8px 0 4px; flex-wrap: nowrap; border-bottom: 1px solid var(--border); }
        .tab { 
            padding: 8px 14px; 
            background: var(--card); 
            border: 1px solid var(--border); 
            color: var(--sub); 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 12px; 
            white-space: nowrap; 
            transition: 0.2s; 
            font-weight: 500;
        }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        .tab:active { transform: scale(0.95); }
        .page { display: none; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 8px; }
        label { display: block; font-size: 11px; color: var(--sub); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        input, textarea, select { 
            width: 100%; padding: 10px 12px; 
            background: var(--input); 
            border: 1px solid var(--border); 
            color: var(--text); 
            border-radius: 8px; 
            font-size: 14px; 
            font-family: inherit; 
        }
        input::placeholder, textarea::placeholder {
            color: var(--sub);
            opacity: 0.5;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; }
        textarea { height: 55px; resize: vertical; font-size: 14px; }
        .row { display: flex; gap: 6px; }
        .row > * { flex: 1; }
        button { 
            padding: 10px 16px; 
            background: var(--accent); 
            border: none; 
            color: #000; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.15s; 
            width: 100%; 
            margin: 3px 0; 
        }
        button:active { transform: scale(0.97); }
        .btn-sm { width: auto; padding: 6px 12px; font-size: 12px; border-radius: 6px; }
        .btn-xs { width: auto; padding: 6px 12px; font-size: 12px; border-radius: 6px; }
        .btn-green { background: var(--green); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-blue { background: var(--blue); color: #000; }
        .btn-yellow { background: var(--yellow); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-purple { background: var(--purple); color: #000; }
        .btn-center { display: block; margin: 6px auto; padding: 12px 24px; font-size: 15px; min-width: 250px; width: auto; text-align: center; border-radius: 10px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin: 8px 0; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 6px; }
        .card-header span { font-size: 15px; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-sd { background: var(--accent); color: #000; }
        .badge-closed { background: var(--green); color: #000; }
        .card-body { font-size: 13px; color: var(--sub); line-height: 1.6; }
        .card-footer { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
        .card-footer button { flex: 0 1 auto; min-width: 70px; }
        .highlight { color: var(--accent); font-weight: bold; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin: 8px 0; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
        .stat-item { text-align: center; padding: 6px; }
        .stat-num { font-size: 22px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.3px; }
        .stat-sub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 4px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }
        .stat-sub-item {
            text-align: center;
            padding: 4px;
            background: var(--input);
            border-radius: 6px;
        }
        .stat-sub-item .num {
            font-size: 16px;
            font-weight: bold;
            color: var(--blue);
        }
        .stat-sub-item .label {
            font-size: 9px;
            color: var(--sub);
        }
        .table-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: center; font-size: 13px; }
        .photo-gallery { display: flex; gap: 6px; overflow-x: auto; padding: 6px 0; }
        .photo-thumb { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; }
        .photo-full { width: 100%; border-radius: 8px; margin: 8px 0; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card); border-radius: 16px 16px 0 0; padding: 16px; width: 100%; max-width: 750px; max-height: 95vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 10px; color: var(--accent); font-size: 17px; }
        .search-box { margin-bottom: 8px; }
        .filter-chips { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
        .chip { padding: 5px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; font-size: 11px; cursor: pointer; color: var(--sub); }
        .chip.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--sub); }
        .empty-icon { font-size: 48px; margin-bottom: 10px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 200; animation: toastIn 0.3s, toastOut 0.3s 1.5s forwards; font-size: 14px; }
        .toast-warning { background: var(--yellow); color: #000; }
        @keyframes toastIn { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 20px; } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
        .service-catalog { max-height: calc(95vh - 170px); overflow-y: auto; }
        .service-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 14px; }
        .service-item:active { background: var(--input); }
        .service-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 4px; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .service-check.checked { background: var(--accent); border-color: var(--accent); }
        .service-check.checked::after { content: '✓'; color: #000; font-weight: bold; font-size: 14px; }
        .sum-display { font-size: 16px; font-weight: bold; text-align: center; padding: 10px; background: var(--input); border-radius: 8px; margin: 10px 0; }
        .sum-match { color: var(--green); }
        .sum-mismatch { color: var(--red); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .act-container {
            background: #fff !important;
            color: #000 !important;
            padding: 25px 30px;
            font-family: 'Times New Roman', serif;
            font-size: 13px;
            line-height: 1.4;
            max-width: 700px;
            margin: 0 auto;
        }
        .act-container * {
            color: #000 !important;
            background: transparent !important;
        }
        .act-container h2 {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            color: #000 !important;
        }
        .act-container .act-subtitle {
            text-align: right;
            font-size: 12px;
            margin-bottom: 12px;
            color: #000 !important;
        }
        .act-container .act-row {
            display: flex;
            margin-bottom: 4px;
        }
        .act-container .act-label {
            width: 170px;
            font-weight: 600;
            flex-shrink: 0;
            color: #000 !important;
        }
        .act-container .act-value {
            border-bottom: 1px solid #000;
            flex: 1;
            min-height: 20px;
            padding: 0 4px;
            color: #000 !important;
        }
        .act-container table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 12px;
        }
        .act-container table th {
            background: #f0f2f5 !important;
            border: 1px solid #000;
            padding: 4px 3px;
            text-align: center;
            font-weight: 700;
            font-size: 11px;
            color: #000 !important;
        }
        .act-container table td {
            border: 1px solid #000;
            padding: 3px;
            text-align: center;
            font-size: 11px;
            color: #000 !important;
        }
        .act-container .total-line {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin: 4px 0;
            font-size: 14px;
            color: #000 !important;
        }
        .act-container .propis-line {
            font-weight: 600;
            margin: 6px 0;
            color: #000 !important;
        }
        .act-container .act-section-title {
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            margin: 16px 0 8px;
            color: #000 !important;
        }
        .act-container .act-text {
            text-align: justify;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 14px;
            color: #000 !important;
        }
        .act-container .sign-block {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 20px;
        }
        .act-container .sign-col {
            flex: 1;
            font-size: 12px;
            color: #000 !important;
        }
        .act-container .sign-col div {
            margin-bottom: 3px;
            color: #000 !important;
        }
        @media print {
            body { background: #fff !important; }
            .tabs, .card, button, #btn-print-act, #btn-fill-act { display: none !important; }
            .act-container { box-shadow: none; padding: 0; max-width: 100%; }
            #act-print-area { display: block !important; }
        }

        .chart-container {
            margin: 10px 0;
            padding: 10px;
            background: var(--input);
            border-radius: 8px;
            overflow-x: auto;
        }
        .chart-bar-container {
            display: flex;
            align-items: flex-end;
            height: 120px;
            gap: 4px;
            padding: 4px 0;
            min-width: 300px;
        }
        .chart-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 20px;
        }
        .chart-bar {
            width: 100%;
            min-height: 2px;
            background: var(--accent);
            border-radius: 3px 3px 0 0;
            transition: 0.3s;
            position: relative;
        }
        .chart-bar:hover {
            opacity: 0.7;
        }
        .chart-bar-label {
            font-size: 8px;
            color: var(--sub);
            margin-top: 4px;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chart-bar-value {
            font-size: 8px;
            color: var(--text);
            margin-bottom: 2px;
        }

        .client-stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 8px 0;
        }
        .client-stat-item {
            text-align: center;
            padding: 8px;
            background: var(--input);
            border-radius: 8px;
        }
        .client-stat-item .num {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
        }
        .client-stat-item .label {
            font-size: 10px;
            color: var(--sub);
        }
        .order-history-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.15s;
        }
        .order-history-item:active {
            background: var(--input);
        }
        .order-history-item .top {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .order-history-item .bottom {
            font-size: 11px;
            color: var(--sub);
            margin-top: 2px;
        }

        .footer-credit {
            text-align: center;
            padding: 16px 0 8px;
            font-size: 11px;
            color: var(--sub);
            border-top: 1px solid var(--border);
            margin-top: 12px;
            opacity: 0.6;
            letter-spacing: 0.5px;
        }
        .footer-credit span {
            color: var(--accent);
        }

        .warehouse-item-low {
            border-left: 3px solid var(--red) !important;
        }
        .warehouse-item-ok {
            border-left: 3px solid var(--green) !important;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }
        .expense-item .info {
            flex: 1;
        }
        .expense-item .info .desc {
            font-size: 13px;
        }
        .expense-item .info .date {
            font-size: 11px;
            color: var(--sub);
        }
        .expense-item .amount {
            font-weight: bold;
            color: var(--red);
            margin-right: 8px;
        }
        .expense-item .delete-btn {
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            width: auto;
            min-width: 40px;
        }
        .expense-item .delete-btn:active {
            transform: scale(0.95);
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .service-select-btn {
            display: block;
            margin: 6px auto;
            padding: 12px 24px;
            font-size: 15px;
            min-width: 250px;
            width: auto;
            text-align: center;
            border-radius: 10px;
        }

        .install-banner {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-top: 2px solid var(--accent);
            padding: 12px 16px;
            z-index: 300;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        .install-banner.show {
            display: flex;
        }
        .install-banner .text {
            font-size: 13px;
            flex: 1;
        }
        .install-banner .text strong {
            color: var(--accent);
        }
        .install-banner button {
            width: auto;
            padding: 8px 20px;
            margin: 0;
            font-size: 13px;
            flex-shrink: 0;
        }
        .install-banner .close-btn {
            background: transparent;
            color: var(--sub);
            padding: 4px 8px;
            width: auto;
            font-size: 18px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="install-banner" id="install-banner">
    <span class="text">📱 Установи <strong>CRM Ремонт Pro</strong> на телефон</span>
    <button id="install-btn" class="btn-green">Установить</button>
    <button class="close-btn" onclick="document.getElementById('install-banner').classList.remove('show')">✕</button>
</div>

<div class="tabs" id="tabs-container">
    <button class="tab active" onclick="switchTab('new')">➕ Заявка</button>
    <button class="tab" onclick="switchTab('orders')">📋 Заявки</button>
    <button class="tab" onclick="switchTab('warehouse')">📦 Склад</button>
    <button class="tab" onclick="switchTab('expenses')">💰 Расходы</button>
    <button class="tab" onclick="switchTab('stats')">📊 Отчёт</button>
    <button class="tab" onclick="switchTab('clients')">👥 Клиенты</button>
    <button class="tab" onclick="switchTab('print')">🖨️ Акт</button>
    <button class="tab" onclick="switchTab('settings')">⚙️</button>
</div>

<!-- Новая заявка -->
<div id="page-new" class="page active">
    <div class="card">
        <div class="form-group"><label>👤 Имя клиента *</label><input type="text" id="n-name" placeholder="Иван Иванов"></div>
        <div class="row"><div class="form-group"><label>📞 Телефон *</label><input type="tel" id="n-phone" placeholder="+7 900 123-45-67" inputmode="numeric"></div><div class="form-group"><label>📍 Адрес</label><input type="text" id="n-address" placeholder="ул. Примерная, д. 1"></div></div>
        <div class="row"><div class="form-group"><label>🔧 Тип техники</label><select id="n-tech" onchange="updateServiceCatalog()"><option value="">— Выберите —</option><option>Холодильник</option><option>Стиральная машина</option><option>Посудомоечная машина</option><option>Морозильная камера</option><option>Духовой шкаф</option><option>Варочная панель</option><option>Кондиционер</option><option>Водонагреватель</option><option>Другое</option></select></div><div class="form-group"><label>🏷️ Бренд / Модель</label><input type="text" id="n-brand" placeholder="Samsung, LG..."></div></div>
        <div class="form-group"><label>🛠️ Неисправность со слов клиента</label><textarea id="n-issue" placeholder="Описание неисправности..."></textarea></div>
        <div class="form-group"><label>🔍 Результат диагностики</label><textarea id="n-diagnosis" placeholder="Фактическая причина поломки..."></textarea></div>
        <div class="form-group"><label>📝 Внешние дефекты</label><input type="text" id="n-defects" placeholder="Царапины, сколы ДО ремонта"></div>
        
        <div class="form-group"><label>🔧 Выбранные услуги</label>
            <button class="btn-center service-select-btn btn-outline" onclick="showServiceModal()">📋 Выбрать услуги из каталога</button>
            <div id="selected-services" style="margin-top:6px;font-size:13px;"></div>
            <div id="services-total-display" style="text-align:center;font-weight:bold;margin-top:6px;font-size:14px;"></div>
        </div>
        
        <div class="row"><div class="form-group"><label>💰 Итоговая сумма (₽)</label><input type="number" id="n-sum" placeholder="26000" inputmode="numeric"></div><div class="form-group"><label>💳 Предоплата (₽)</label><input type="number" id="n-prepay" placeholder="0" inputmode="numeric"></div></div>
        <div class="row"><div class="form-group"><label>🎁 Скидка (₽)</label><input type="number" id="n-discount" placeholder="0" inputmode="numeric"></div><div class="form-group"><label>🛡️ Гарантия (мес.)</label><input type="number" id="n-guarantee" placeholder="6" inputmode="numeric"></div></div>
        <div class="row"><div class="form-group"><label>🧾 Серые расходы</label><input type="number" id="n-gray" placeholder="0" inputmode="numeric"></div><div class="form-group"><label>📄 Белые расходы</label><input type="number" id="n-white" placeholder="0" inputmode="numeric"></div></div>
        <div class="form-group">
            <label>📊 Ваш %</label>
            <input type="number" id="n-percent" placeholder="50" inputmode="numeric" style="font-weight:bold;color:var(--accent);">
        </div>
        <div class="form-group"><label>📸 Фото</label><input type="file" id="n-photos" accept="image/*" multiple onchange="previewPhotos()"></div>
        <div id="photo-preview" class="photo-gallery"></div>
        <div class="form-group"><label>📌 Статус</label><select id="n-status"><option value="Закрыта">🔴 Закрыта</option><option value="СД">🟢 СД</option></select></div>
        <div id="edit-indicator" style="display:none;background:var(--yellow);color:#000;padding:6px;border-radius:6px;margin-bottom:6px;font-size:12px;">⚠️ Редактирование</div>
        <button id="save-btn" onclick="saveOrder()">✅ Сохранить заявку</button>
        <button class="btn-outline" onclick="clearForm()">🔄 Очистить форму</button>
    </div>
</div>

<!-- Заявки -->
<div id="page-orders" class="page">
    <div class="search-box"><input type="text" id="search-orders" placeholder="🔍 Поиск по имени, телефону, модели..." oninput="renderOrders()"></div>
    <div class="filter-chips">
        <span class="chip active" onclick="filterOrders('all',this)">Все</span>

const U = {
    id: () => {
        const orders = DB.orders();
        let maxNum = 0;
        orders.forEach(o => {
            const num = parseInt(o.id);
            if (!isNaN(num) && num > maxNum) maxNum = num;
        });
        return String(maxNum + 1).padStart(4, '0');
    },
    date: (d) => new Date(d).toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric'}),
    time: (d) => new Date(d).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}),
    dateTime: (d) => {
        const dt = new Date(d);
        return dt.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + 
               dt.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
    },
    money: (n) => (n||0).toLocaleString('ru-RU') + ' ₽',
    nowISO: () => new Date().toISOString(),
    profit(o) {
        if (o.status !== 'Закрыта') return null;
        const total = o.sum - (o.expense_gray||0);
        if (total <= 0) return 0;
        return Math.round(total * (o.percent||50) / 100 + Math.max(0, (o.expense_gray||0) - (o.expense_white||0)));
    },
    numberToWords(n) {
        if (n === 0) return 'ноль';
        const units = ['','один','два','три','четыре','пять','шесть','семь','восемь','девять'];
        const teens = ['десять','одиннадцать','двенадцать','тринадцать','четырнадцать','пятнадцать','шестнадцать','семнадцать','восемнадцать','девятнадцать'];
        const tens = ['','','двадцать','тридцать','сорок','пятьдесят','шестьдесят','семьдесят','восемьдесят','девяносто'];
        const hundreds = ['','сто','двести','триста','четыреста','пятьсот','шестьсот','семьсот','восемьсот','девятьсот'];
        let result = ''; let num = n;
        if (num >= 1000) { const t = Math.floor(num/1000); if(t===1) result+='одна тысяча '; else if(t===2) result+='две тысячи '; else if(t<5) result+=units[t]+' тысячи '; else result+=(units[t]||'')+' тысяч '; num%=1000; }
        if (num >= 100) { result += hundreds[Math.floor(num/100)]+' '; num%=100; }
        if (num >= 20) { result += tens[Math.floor(num/10)]+' '; num%=10; }
        if (num >= 10) { result += teens[num-10]; num=0; }
        if (num > 0) result += units[num];
        return result.trim();
    },
    rubles(n) { const last=n%10,last2=n%100; if(last2>=11&&last2<=19)return'рублей'; if(last===1)return'рубль'; if(last>=2&&last<=4)return'рубля'; return'рублей'; },
    formatOrderId(id) {
        return '№' + String(id).padStart(4, '0');
    },
    roundToNice(price) {
        if (price <= 0) return 0;
        if (price < 100) return Math.round(price / 10) * 10;
        else if (price < 500) return Math.round(price / 50) * 50;
        else if (price < 2000) return Math.round(price / 50) * 50;
        else return Math.round(price / 100) * 100;
    }
};

let tempPhotos=[];

function previewPhotos(){
    const files=document.getElementById('n-photos').files;
    tempPhotos=[]; document.getElementById('photo-preview').innerHTML='';
    for(let i=0;i<Math.min(files.length,5);i++){
        const reader=new FileReader();
        reader.onload=(e)=>{
            compressImage(e.target.result, 800, 0.7, (compressed) => {
                tempPhotos.push(compressed);
                const img=document.createElement('img');
                img.src=compressed;
                img.className='photo-thumb';
                img.onclick=()=>showFullPhoto(compressed);
                document.getElementById('photo-preview').appendChild(img);
            });
        };
        reader.readAsDataURL(files[i]);
    }
}

function compressImage(dataUrl, maxWidth, quality, callback) {
    const img = new Image();
    img.onload = function() {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
            height = height * maxWidth / width;
            width = maxWidth;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, width, height);
        callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
}

function showFullPhoto(src){

function updateServiceSumDisplay(){
    const total=selectedServices.reduce((s,ss)=>s+ss.price*ss.qty,0);
    const targetSum=parseInt(document.getElementById('n-sum').value)||0;
    const diff=targetSum-total;
    const display=document.getElementById('service-sum-display');
    if(targetSum>0)display.innerHTML=`📋 Услуг выбрано на: <b>${U.money(total)}</b><br>🎯 Цель: <b>${U.money(targetSum)}</b><br>📊 Разница: <b class="${diff===0?'sum-match':'sum-mismatch'}">${diff>=0?'+':''}${U.money(diff)}</b>`;
    else display.innerHTML=`📋 Услуг выбрано на: <b>${U.money(total)}</b>`;
}

function applyServices(){
    const targetSum = parseInt(document.getElementById('n-sum').value) || 0;
    if(selectedServices.length === 0){closeServiceModal();return;}
    
    if(targetSum > 0){
        const totalBase = selectedServices.reduce((s,ss) => s + ss.price, 0);
        if(totalBase > 0 && totalBase !== targetSum){
            const ratio = targetSum / totalBase;
            
            selectedServices.forEach((ss, i) => {
                if(i < selectedServices.length - 1){
                    ss.price = Math.round(ss.price * ratio);
                }
            });
            
            let roundedTotal = 0;
            selectedServices.forEach((ss, i) => {
                if(i < selectedServices.length - 1){
                    ss.price = U.roundToNice(ss.price);
                    roundedTotal += ss.price;
                }
            });
            
            let diff = targetSum - roundedTotal;
            let lastPrice = Math.round(diff);
            if (lastPrice < 100 && lastPrice > 0) {
                lastPrice = Math.round(lastPrice / 10) * 10;
            } else if (lastPrice < 500 && lastPrice > 0) {
                lastPrice = Math.round(lastPrice / 50) * 50;
            } else if (lastPrice > 0) {
                lastPrice = Math.round(lastPrice / 100) * 100;
            }
            
            if (lastPrice <= 0 && selectedServices.length > 1) {
                let remaining = diff;
                for (let i = selectedServices.length - 2; i >= 0; i--) {
                    if (remaining > 0) {
                        let add = Math.min(remaining, 100);
                        selectedServices[i].price += add;
                        remaining -= add;
                    }
                }
                lastPrice = Math.max(0, remaining);
            }
            
            if (selectedServices.length > 0) {
                selectedServices[selectedServices.length - 1].price = Math.max(0, lastPrice);
            }
            
            let finalTotal = selectedServices.reduce((s,ss) => s + ss.price, 0);
            if (finalTotal !== targetSum) {
                const adjust = targetSum - finalTotal;
                if (selectedServices.length > 0) {
                    selectedServices[selectedServices.length - 1].price += adjust;
                    if (selectedServices[selectedServices.length - 1].price < 0) {
                        selectedServices[selectedServices.length - 1].price = 0;
                    }
                }
            }
        }
    }
    
    const container = document.getElementById('selected-services');
    container.innerHTML = selectedServices.map(s => 
        `<div class="table-row"><span>✓ ${s.name}</span><span>${U.money(s.price)}</span></div>`
    ).join('');
    
    const totalAfter = selectedServices.reduce((s,ss) => s + ss.price, 0);
    document.getElementById('services-total-display').innerHTML = 
        `📊 Итого услуг: <b>${U.money(totalAfter)}</b> ${targetSum > 0 ? `| ${totalAfter === targetSum ? '✅ Совпадает' : '⚠️ Разница: ' + U.money(targetSum - totalAfter)}` : ''}`;
    
    if(!document.getElementById('n-issue').value.trim()){
        document.getElementById('n-issue').value = selectedServices.map(s => s.name).join(', ');
    }
    closeServiceModal();
}

function renderExpenses(){
    const expenses=DB.expenses();
    const search=(document.getElementById('search-expenses')?.value||'').toLowerCase();
    let filtered = expenses;
    if(search) {
        filtered = expenses.filter(e => 
            e.category.toLowerCase().includes(search) || 
            e.description.toLowerCase().includes(search)
        );
    }
    const container=document.getElementById('expenses-container');
    if(!filtered.length){
        container.innerHTML=expenses.length ? 
            '<div class="empty-state"><div class="empty-icon">🔍</div>Ничего не найдено</div>' :
            '<div class="empty-state"><div class="empty-icon">💰</div>Нет расходов</div>';
        return;
    }
    const byCat={};
    filtered.forEach(e=>{
        if(!byCat[e.category]) byCat[e.category]={total:0,items:[]};
        byCat[e.category].total += e.amount;
        byCat[e.category].items.push(e);
    });
    container.innerHTML=Object.entries(byCat).map(([cat,data]) => `
        <div class="card">

                <div class="expense-item">
                    <div class="info">
                        <div class="desc">${e.description}</div>
                        <div class="date">${U.dateTime(e.date)}</div>

}

// ==================== СТАТИСТИКА ====================
function changePeriod(p,el){document.querySelectorAll('#page-stats .chip').forEach(c=>c.classList.remove('active'));if(el)el.classList.add('active');renderStats(p);}

function getPeriodDates(period){const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());let from;if(period==='today')from=today;else if(period==='week')from=new Date(today.getTime()-7*86400000);else if(period==='month')from=new Date(today.getTime()-30*86400000);else from=new Date(0);return{from:from.toISOString(),to:now.toISOString()};}

function renderStats(period){
    const{from,to}=getPeriodDates(period);
    const orders=DB.orders().filter(o=>o.created>=from&&o.created<=to);
    const closed=orders.filter(o=>o.status==='Закрыта');
    const active=orders.filter(o=>o.status==='СД');
    const revenue=closed.reduce((s,o)=>s+o.sum,0);
    const profit=closed.reduce((s,o)=>s+(U.profit(o)||0),0);
    const otherExp=DB.expenses().filter(e=>e.date>=from&&e.date<=to).reduce((s,e)=>s+e.amount,0);
    const avgCheck = closed.length > 0 ? Math.round(revenue / closed.length) : 0;
    
    const techStats = {};
    closed.forEach(o => {
        if(o.tech){
            if(!techStats[o.tech]) techStats[o.tech] = { total: 0, count: 0 };
            techStats[o.tech].total += o.sum;
            techStats[o.tech].count++;
        }
    });
    let techHtml = '';
    if(Object.keys(techStats).length > 0){
        techHtml = `<div class="stat-sub-grid">
            ${Object.entries(techStats).map(([tech, data]) => `
                <div class="stat-sub-item">
                    <div class="num">${U.money(Math.round(data.total / data.count))}</div>
                    <div class="label">${tech} (${data.count})</div>
                </div>
            `).join('')}
        </div>`;
    }
    
    let chartHtml = '';
    if (closed.length > 0) {
        const days = {};
        closed.forEach(o => {
            const day = U.date(o.created);
            if (!days[day]) days[day] = 0;
            days[day] += U.profit(o) || 0;
        });
        const sortedDays = Object.keys(days).sort();
        const maxVal = Math.max(...Object.values(days), 1);
        chartHtml = `<div class="chart-container">
            <div style="font-size:12px;color:var(--sub);margin-bottom:6px;">📈 Динамика прибыли по дням</div>
            <div class="chart-bar-container">
                ${sortedDays.map(day => {
                    const val = days[day];
                    const height = Math.max(5, (val / maxVal) * 100);
                    return `<div class="chart-bar-wrapper">
                        <div class="chart-bar-value">${U.money(val)}</div>
                        <div class="chart-bar" style="height:${height}px;"></div>
                        <div class="chart-bar-label">${day}</div>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
    }
    
    document.getElementById('stats-container').innerHTML=`
        <div class="stat-card">
            <div class="stat-grid">
                <div class="stat-item"><div class="stat-num">${orders.length}</div><div class="stat-label">Заявок</div></div>
                <div class="stat-item"><div class="stat-num">${active.length}</div><div class="stat-label">В работе</div></div>
                <div class="stat-item"><div class="stat-num">${closed.length}</div><div class="stat-label">Закрыто</div></div>
                <div class="stat-item"><div class="stat-num" style="color:var(--blue)">${U.money(revenue)}</div><div class="stat-label">Выручка</div></div>
                <div class="stat-item"><div class="stat-num" style="color:var(--green)">${U.money(profit)}</div><div class="stat-label">Прибыль</div></div>
                <div class="stat-item"><div class="stat-num" style="color:var(--yellow)">${U.money(avgCheck)}</div><div class="stat-label">Средний чек</div></div>
                <div class="stat-item"><div class="stat-num" style="color:var(--red)">${U.money(otherExp)}</div><div class="stat-label">Расходы</div></div>
            </div>
            ${techHtml}
        </div>
        ${chartHtml}
    `;
}

function renderClients(){
    const orders=DB.orders();
    const clients={};
    orders.forEach(o=>{
        if(!clients[o.phone]) {
            clients[o.phone] = {
                name: o.name,
                phone: o.phone,
                address: o.address || '—',
                orders: [],
                total: 0,
                count: 0
            };
        }
        clients[o.phone].orders.push(o);
        if(o.status==='Закрыта') {
            clients[o.phone].total += o.sum;
            clients[o.phone].count++;
        }
    });
    
    const search=(document.getElementById('search-clients')?.value||'').toLowerCase();
    let list=Object.values(clients);
    if(search) list=list.filter(c => c.name.toLowerCase().includes(search) || c.phone.includes(search));
    list.sort((a,b) => b.total - a.total);
    
    const container=document.getElementById('clients-container');
    if(!list.length){
        container.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div>Нет клиентов</div>';

    container.innerHTML=list.map(c => `

function showRestoreModal(){

    document.getElementById('modal-overlay').classList.add('active');
}

function restoreFromFile(){
    const file=document.getElementById('restore-file').files[0];
    if(!file){toast('❌ Выберите файл!');return;}
    const reader=new FileReader();
    reader.onload=(e)=>{
        try{
            const data=JSON.parse(e.target.result);
            if(!data.orders)throw new Error();
            if(!confirm(`Восстановить данные от ${U.dateTime(data.date)}?`))return;
            DB.saveOrders(data.orders||[]);DB.saveWarehouse(data.warehouse||[]);DB.saveExpenses(data.expenses||[]);
            if(data.settings)DB.saveSettings(data.settings);
            closeModal();toast('✅ Восстановлено!');location.reload();
        }catch{toast('❌ Ошибка файла!');}
    };
    reader.readAsText(file);
}
